<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBT-ReViva</title>
    <style>
        /* Estética iOS 18 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1A3C34 0%, #2E5A4E 50%, #F39200 100%);
            overflow: hidden;
        }

        .container {
            width: 380px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        /* Estilo do Texto OBT-ReViva */
        .brand-name {
            font-size: 32px;
            font-weight: 800;
            color: white;
            margin-bottom: 30px;
            letter-spacing: -1px;
        }

        .brand-name span {
            color: #F39200; /* Destaque no ReViva */
        }

        h2 {
            color: white;
            font-weight: 400;
            margin-bottom: 25px;
            font-size: 18px;
            opacity: 0.9;
        }

        .input-group {
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 16px 20px;
            border-radius: 14px;
            border: none;
            background: rgba(255, 255, 255, 0.9);
            font-size: 16px;
            outline: none;
        }

        .btn-primary {
            width: 100%;
            padding: 16px;
            margin-top: 10px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(90deg, #448A3A 0%, #F39200 100%);
            color: white;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-primary:active {
            transform: scale(0.96);
        }

        .footer-links {
            margin-top: 25px;
            color: white;
            font-size: 14px;
        }

        .footer-links a {
            color: #F39200;
            text-decoration: none;
            font-weight: 600;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="brand-name">OBT-<span>ReViva</span></div>

        <div id="loginForm">
            <h2>Acesse sua conta</h2>
            <div class="input-group">
                <input type="text" id="loginUser" placeholder="E-mail ou CPF">
            </div>
            <div class="input-group">
                <input type="password" id="loginPass" placeholder="Senha">
            </div>
            <button class="btn-primary" onclick="handleLogin()">Entrar</button>
            <div class="footer-links">
                <p>Não tem uma conta? <a href="#" onclick="toggleForm()">Cadastre-se</a></p>
            </div>
        </div>

        <div id="registerForm" class="hidden">
            <h2>Crie sua conta</h2>
            <div class="input-group">
                <input type="text" id="regName" placeholder="Nome Completo">
            </div>
            <div class="input-group">
                <input type="email" id="regEmail" placeholder="E-mail">
            </div>
            <div class="input-group">
                <input type="password" id="regPass" placeholder="Crie uma Senha">
            </div>
            <button class="btn-primary" onclick="handleRegister()">Finalizar Cadastro</button>
            <div class="footer-links">
                <p>Já possui conta? <a href="#" onclick="toggleForm()">Fazer Login</a></p>
            </div>
        </div>
    </div>

    <script>
        function toggleForm() {
            document.getElementById('loginForm').classList.toggle('hidden');
            document.getElementById('registerForm').classList.toggle('hidden');
        }

        function handleLogin() {
            // Simulação de Login
            alert("Login concluído com sucesso!");
        }

        function handleRegister() {
            // Simulação de Cadastro
            alert("Cadastro concluído com sucesso!");
            toggleForm(); // Volta para o login após cadastrar
        }
    </script>
</body>
</html>
